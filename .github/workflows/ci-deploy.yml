name: CI & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Build server
        run: cd server && npm run build

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Prepare FLY_API_TOKEN
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "::error::FLY_API_TOKEN not set. Add it in Repo Settings → Secrets."
            exit 1
          fi
          # 去掉粘贴时带入的换行和首尾空格
          SANITIZED=$(printf '%s' "${{ secrets.FLY_API_TOKEN }}" | tr -d '\n\r' | xargs)
          echo "FLY_API_TOKEN=$SANITIZED" >> $GITHUB_ENV

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify Fly auth
        run: flyctl status -a feedlingo

      - name: Deploy app
        run: flyctl deploy --remote-only --app feedlingo --verbose
