# 手动触发 Hetzner 上的 daily pipeline。
# 自动定时由应用内置 scheduler 负责，避免和 GitHub Actions 双调度。
name: Daily Crawl

on:
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily pipeline and wait for completion
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_BASE_URL: http://178.104.239.25
        run: |
          # 去掉可能的换行（粘贴时带入）
          CRON_SECRET=$(printf '%s' "$CRON_SECRET" | tr -d '\n\r')
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET not set. Add it in Repo Settings → Secrets (must match Hetzner app env)."
            exit 1
          fi
          RUN_DATE=$(TZ=America/Los_Angeles date +%F)

          resp=$(curl -s -w "\n%{http_code}" -X POST "$APP_BASE_URL/api/cron/daily?async=1&reset=1&date=$RUN_DATE" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json") || true
          code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "HTTP $code"
          echo "Body: $body"
          if [ "$code" != "202" ]; then
            echo "::error::Expected 202, got $code. Check CRON_SECRET in repo secrets."
            exit 1
          fi

          # Poll final run status (up to 30 minutes)
          for i in $(seq 1 60); do
            status_resp=$(curl -s -w "\n%{http_code}" "$APP_BASE_URL/api/cron/daily-status?date=$RUN_DATE" \
              -H "Authorization: Bearer $CRON_SECRET") || true
            status_code=$(echo "$status_resp" | tail -n1)
            status_body=$(echo "$status_resp" | sed '$d')
            echo "Poll #$i HTTP $status_code body=$status_body"
            if [ "$status_code" != "200" ]; then
              sleep 30
              continue
            fi

            status=$(echo "$status_body" | jq -r '.status // "missing"')
            if [ "$status" = "success" ]; then
              echo "Daily pipeline success for $RUN_DATE"
              exit 0
            fi
            if [ "$status" = "failed" ]; then
              err=$(echo "$status_body" | jq -r '.error // "unknown error"')
              echo "::error::Daily pipeline failed: $err"
              exit 1
            fi
            sleep 30
          done

          echo "::error::Daily pipeline did not finish within 30 minutes."
          exit 1
